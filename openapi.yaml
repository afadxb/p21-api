openapi: 3.0.3
info:
  title: P21 API
  version: 1.0.0
  description: |
    OpenAPI documentation refreshed to match currently mounted routes in `server.js`.

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
  - name: Sales
  - name: Inventory
  - name: Accounts Payable
  - name: System

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: number
                    example: 123.45

  /v1/sales/order:
    post:
      tags: [Sales]
      summary: Create one or more sales orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/SalesOrderBatchRequest'
                - $ref: '#/components/schemas/SalesOrderSingleRequest'
      responses:
        '201':
          description: Sales orders accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sales orders Accepted
                  orders:
                    type: array
                    items:
                      type: object
                      properties:
                        importSetNo:
                          type: string
                        linesInserted:
                          type: integer
        '400':
          description: Invalid payload
        '500':
          description: Server error

  /v1/sales/order/{order_id}:
    get:
      tags: [Sales]
      summary: Get sales order by order number or job name
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sales order details
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    type: object
                    additionalProperties: true
                  lines:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '404':
          description: Order not found
        '500':
          description: Server error

  /v1/inventory/items:
    get:
      tags: [Inventory]
      summary: List items
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 500
        - in: query
          name: updatedSince
          schema:
            type: string
            format: date-time
        - in: query
          name: updated_since
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Items list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/inventory/items/{item_id}:
    get:
      tags: [Inventory]
      summary: Get one item
      parameters:
        - in: path
          name: item_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Not found

  /v1/ap/purchaseorders:
    get:
      tags: [Accounts Payable]
      summary: List purchase orders
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 2000, default: 500 }
        - in: query
          name: company
          schema: { type: string }
        - in: query
          name: vendor
          schema: { type: string }
        - in: query
          name: updatedSince
          schema: { type: string, format: date-time }
        - in: query
          name: updated_since
          schema: { type: string, format: date-time }
        - in: query
          name: fromDate
          schema: { type: string, format: date }
        - in: query
          name: toDate
          schema: { type: string, format: date }
      responses:
        '200':
          description: Purchase orders list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/ap/purchaseorders/{poNo}:
    get:
      tags: [Accounts Payable]
      summary: Get purchase order details
      parameters:
        - in: path
          name: poNo
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Purchase order details
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Not found

  /v1/ap/paymentdetail:
    get:
      tags: [Accounts Payable]
      summary: List payment details
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 2000, default: 500 }
        - in: query
          name: company
          schema: { type: string }
        - in: query
          name: vendor
          schema: { type: string }
        - in: query
          name: voucherNo
          schema: { type: string }
        - in: query
          name: invoiceNo
          schema: { type: string }
        - in: query
          name: poNo
          schema: { type: string }
        - in: query
          name: updatedSince
          schema: { type: string, format: date-time }
        - in: query
          name: updated_since
          schema: { type: string, format: date-time }
        - in: query
          name: checkDate
          schema: { type: string, format: date }
        - in: query
          name: check_date
          schema: { type: string, format: date }
      responses:
        '200':
          description: Payment details list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentDetailListResponse'
        '400':
          description: Invalid filter values
        '500':
          description: Server error

  /v1/ap/paymentterms:
    get:
      tags: [Accounts Payable]
      summary: List payment terms
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 2000, default: 500 }
        - in: query
          name: updated_since
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Payment terms list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/ap/suppliers:
    get:
      tags: [Accounts Payable]
      summary: List suppliers
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 2000, default: 500 }
        - in: query
          name: updatedSince
          schema: { type: string, format: date-time }
        - in: query
          name: updated_since
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Suppliers list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/ap/receipts:
    get:
      tags: [Accounts Payable]
      summary: List AP receipts
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 2000, default: 500 }
        - in: query
          name: receiptNumber
          schema: { type: integer }
        - in: query
          name: receipt_number
          schema: { type: integer }
        - in: query
          name: poNumber
          schema: { type: integer }
        - in: query
          name: po_number
          schema: { type: integer }
        - in: query
          name: updatedSince
          schema: { type: string, format: date-time }
        - in: query
          name: updated_since
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Receipt list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid filters

  /v1/ap/voucher:
    get:
      tags: [Accounts Payable]
      summary: List vouchers
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 2000, default: 500 }
        - in: query
          name: voucher
          schema: { type: integer }
        - in: query
          name: voucherNo
          schema: { type: integer }
        - in: query
          name: voucher_no
          schema: { type: integer }
        - in: query
          name: vendor
          schema: { type: integer }
        - in: query
          name: vendorId
          schema: { type: integer }
        - in: query
          name: vendor_id
          schema: { type: integer }
        - in: query
          name: updatedSince
          schema: { type: string, format: date-time }
        - in: query
          name: updated_since
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Voucher list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid filters

  /v1/system/exch_rates:
    get:
      tags: [System]
      summary: List current exchange rates
      responses:
        '200':
          description: Exchange rates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    from_currency: { type: string }
                    to_currency: { type: string }
                    exchange_rate: { type: number }
                    reverse_exchange_rate: { type: number }
                    exchange_date: { type: string, format: date-time }

  /v1/system/periods:
    get:
      tags: [System]
      summary: List periods for current year
      responses:
        '200':
          description: Periods
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /v1/system/periods/{year}:
    get:
      tags: [System]
      summary: List periods for a specific year
      parameters:
        - in: path
          name: year
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Periods
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '400':
          description: Invalid year parameter

components:
  schemas:
    SalesOrderSingleRequest:
      type: object
      required: [header, lines]
      properties:
        header:
          type: object
          additionalProperties: true
        lines:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: true

    SalesOrderBatchRequest:
      type: object
      required: [orders]
      properties:
        orders:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SalesOrderSingleRequest'

    PaymentDetailLine:
      type: object
      properties:
        method: { type: string, nullable: true }
        checkNumber: { type: string, nullable: true }
        checkDate: { type: string, format: date-time, nullable: true }
        paidInFull: { type: boolean }
        amountPaid: { type: number }
        termsAmountTaken: { type: number }

    PaymentDetail:
      type: object
      properties:
        companyNumber: { type: string, nullable: true }
        vendorId: { type: string, nullable: true }
        invoiceNumber: { type: string, nullable: true }
        invoiceDate: { type: string, format: date-time, nullable: true }
        invoiceAmount: { type: number, nullable: true }
        voucherNumber: { type: string, nullable: true }
        currency: { type: string, nullable: true }
        voucherRefInvoiceNumber: { type: string, nullable: true }
        apAccountNumber: { type: string, nullable: true }
        cashAccountNumber: { type: string, nullable: true }
        approved: { type: boolean }
        poNumber: { type: string, nullable: true }
        PaymentLine:
          type: array
          items:
            $ref: '#/components/schemas/PaymentDetailLine'

    PaymentDetailListResponse:
      type: object
      properties:
        paymentDetails:
          type: array
          items:
            $ref: '#/components/schemas/PaymentDetail'
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        lastPage: { type: boolean }
